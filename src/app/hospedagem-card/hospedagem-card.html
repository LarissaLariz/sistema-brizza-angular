<div class="card-hospedagem">
  <img [src]="imagem" />

  <h3>{{ titulo }}</h3>
  <p class="localizacao">{{ descricao }}</p>
  <p class="preco">R$ {{ hospedagem.preco }} <span>/ noite</span></p>

  <div class="acoes">
    <button (click)="reservar()">Reservar</button>
    <button (click)="verDetalhes()">Ver Detalhes</button>
  </div>
</div>
