<h1>Lofts Guarujá</h1>

<div class="search-shell">
  <div class="search-pill" (click)="$event.stopPropagation()" (keyup.enter)="buscar()" tabindex="0">
    <div class="search-segment location-segment">
      <span class="segment-title">Onde</span>
      <input
        class="search-input"
        type="text"
        placeholder="Buscar destinos"
        [(ngModel)]="localSelecionado"
        (focus)="mostrarSugestoesLocal = true"
        (click)="mostrarSugestoesLocal = true"
        (keyup.enter)="buscar()"
      />
    </div>

    <div class="search-divider"></div>

    <div class="search-segment dates-segment" (click)="abrirCalendario()">
      <span class="segment-title">Quando</span>
      <span class="segment-text">{{ textoDatas }}</span>
    </div>

    <div class="search-divider"></div>

    <div class="search-segment guests-segment" (click)="abrirHospedes()">
      <span class="segment-title">Quem</span>
      <span class="segment-text">{{ textoHospedes }}</span>
    </div>

    <div class="search-actions">
      <button class="search-icon-btn" type="button" (click)="buscar()">Buscar</button>
      <button class="clear-btn" type="button" (click)="limparBusca()">Limpar</button>
    </div>

    <div class="location-dropdown" *ngIf="mostrarSugestoesLocal && lugaresFiltrados.length > 0">
      <button
        class="location-option"
        *ngFor="let lugar of lugaresFiltrados"
        (click)="selecionarLocal(lugar)"
      >
        {{ lugar }}
      </button>
    </div>

    <div class="calendar-dropdown" *ngIf="mostrarCalendario">
      <div class="calendar-tabs">
        <button class="calendar-tab active" type="button">Datas</button>
      </div>

      <div class="calendar-months">
        <div class="calendar-month">
          <h3>abril de 2026</h3>

          <div class="calendar-weekdays">
            <span>D</span>
            <span>S</span>
            <span>T</span>
            <span>Q</span>
            <span>Q</span>
            <span>S</span>
            <span>S</span>
          </div>

          <div class="calendar-days">
            <span class="empty-day"></span>
            <span class="empty-day"></span>
            <span class="empty-day"></span>

            <button
              class="calendar-day"
              *ngFor="let dia of diasAbril"
              type="button"
              (click)="selecionarData('2026-04-' + dia)"
              [class.selected-day]="
                '2026-04-' + dia === dataEntrada || '2026-04-' + dia === dataSaida
              "
            >
              {{ dia }}
            </button>
          </div>
        </div>

        <div class="calendar-month">
          <h3>maio de 2026</h3>

          <div class="calendar-weekdays">
            <span>D</span>
            <span>S</span>
            <span>T</span>
            <span>Q</span>
            <span>Q</span>
            <span>S</span>
            <span>S</span>
          </div>

          <div class="calendar-days">
            <span class="empty-day"></span>
            <span class="empty-day"></span>
            <span class="empty-day"></span>
            <span class="empty-day"></span>
            <span class="empty-day"></span>

            <button
              class="calendar-day"
              *ngFor="let dia of diasMaio"
              type="button"
              (click)="selecionarData('2026-05-' + dia)"
              [class.selected-day]="
                '2026-05-' + dia === dataEntrada || '2026-05-' + dia === dataSaida
              "
            >
              {{ dia }}
            </button>
          </div>
        </div>
      </div>

      <div class="calendar-actions">
        <button class="apply-dates-btn" type="button" (click)="aplicarDatas()">
          Aplicar datas
        </button>
      </div>
    </div>

    <div class="guests-dropdown" *ngIf="mostrarHospedes">
      <div class="guest-row">
        <div>
          <div class="guest-title">Adultos</div>
          <div class="guest-subtitle">13 anos ou mais</div>
        </div>

        <div class="guest-counter">
          <button class="counter-btn" type="button" (click)="alterarQuantidade('adultos', -1); $event.stopPropagation()">-</button>
          <span>{{ adultos }}</span>
          <button class="counter-btn" type="button" (click)="alterarQuantidade('adultos', 1); $event.stopPropagation()">+</button>
        </div>
      </div>

      <div class="guest-row">
        <div>
          <div class="guest-title">Crianças</div>
          <div class="guest-subtitle">De 2 a 12 anos</div>
        </div>

        <div class="guest-counter">
          <button class="counter-btn" type="button" (click)="alterarQuantidade('criancas', -1); $event.stopPropagation()">-</button>
          <span>{{ criancas }}</span>
          <button class="counter-btn" type="button" (click)="alterarQuantidade('criancas', 1); $event.stopPropagation()">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="carrossel-container">
  <button class="seta esquerda" type="button" (click)="scrollEsquerda()">‹</button>

  <div class="lista-hospedagens" #lista>
    <app-hospedagem-card
  *ngFor="let item of hospedagensFiltradas"
  [titulo]="item.titulo"
  [descricao]="item.descricao"
  [imagem]="item.imagem"
  [hospedagem]="item"
  [dataEntrada]="dataEntrada"
  [dataSaida]="dataSaida"
  [adultos]="adultos"
  [criancas]="criancas"
></app-hospedagem-card>
  </div>

  <button class="seta direita" type="button" (click)="scrollDireita()">›</button>
</div>
