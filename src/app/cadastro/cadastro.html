<div class="cadastro-container">
  <div class="cadastro-card">
    <h1>Criar conta</h1>

    <p class="cadastro-subtitulo">Crie sua conta para continuar sua reserva.</p>

    <input type="text" placeholder="Nome" [(ngModel)]="nome" (keyup.enter)="criarCadastro()" />

    <input type="email" placeholder="E-mail" [(ngModel)]="email" (keyup.enter)="criarCadastro()" />

    <input
      type="password"
      placeholder="Senha"
      [(ngModel)]="senha"
      (keyup.enter)="criarCadastro()"
    />

    @if (erroCadastro) {
      <div class="erro-cadastro">
        {{ erroCadastro }}
      </div>
    }

    <button type="button" class="criar-btn" (click)="criarCadastro()">Criar cadastro</button>

    <p class="login-texto">Já tem conta?</p>

    <button type="button" class="login-btn" (click)="irParaLogin()">Ir para login</button>
  </div>
</div>
